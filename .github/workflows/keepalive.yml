name: Keep Awake

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Render
        run: |
          echo "Pinging Render..."
          curl --fail --location https://leadflow-asjj.onrender.com/health
          echo "Success!"